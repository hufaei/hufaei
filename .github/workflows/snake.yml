name: Generate worldline snake

on:
  schedule:
    - cron: "39 3 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install profile generators
        run: npm ci

      - name: Generate worldline statistics
        run: node .github/scripts/generate-stats.mjs
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOTAL_COMMITS: ${{ vars.TOTAL_COMMITS }}

      - name: Generate AniList favorites
        run: node .github/scripts/generate-anilist.mjs
        env:
          ANILIST_USERNAME: LJTLI

      - name: Generate contribution snake
        run: node .github/scripts/generate-snake.mjs
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          TZ: Asia/Shanghai

      - name: Publish worldline graphics
        uses: crazy-max/ghaction-github-pages@v5
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
