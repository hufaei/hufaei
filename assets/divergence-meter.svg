<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="122" viewBox="0 0 1200 122" role="img" aria-labelledby="title desc">
  <title id="title">世界線変動率 1.048596%</title>
  <desc id="desc">Divergence meter reading for the Steins;Gate worldline.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06090c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="tube">
      <stop offset="0" stop-color="#28160a"/>
      <stop offset="1" stop-color="#090604"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .label{font-family:Menlo,'Hiragino Sans',monospace;fill:#39c5bb;letter-spacing:2px}
      .digit{font-family:Menlo,monospace;font-size:48px;font-weight:700;fill:#ff9e45;text-anchor:middle;filter:url(#glow)}
      .cell{fill:url(#tube);stroke:#4d3524;stroke-width:1}
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="120" rx="10" fill="url(#panel)" stroke="#27323a"/>
  <text class="label" x="34" y="47" font-size="19">世界線変動率</text>
  <text class="label" x="34" y="77" font-size="12" fill-opacity="0.56">DIVERGENCE METER</text>
  <g transform="translate(322 16)">
    <rect class="cell" x="0" y="0" width="66" height="88" rx="5"/><text class="digit" x="33" y="61">1</text>
    <text class="digit" x="85" y="61">.</text>
    <rect class="cell" x="104" y="0" width="66" height="88" rx="5"/><text class="digit" x="137" y="61">0</text>
    <rect class="cell" x="179" y="0" width="66" height="88" rx="5"/><text class="digit" x="212" y="61">4</text>
    <rect class="cell" x="254" y="0" width="66" height="88" rx="5"/><text class="digit" x="287" y="61">8</text>
    <rect class="cell" x="329" y="0" width="66" height="88" rx="5"/><text class="digit" x="362" y="61">5</text>
    <rect class="cell" x="404" y="0" width="66" height="88" rx="5"/><text class="digit" x="437" y="61">9</text>
    <rect class="cell" x="479" y="0" width="66" height="88" rx="5"/><text class="digit" x="512" y="61">6</text>
    <text class="digit" x="572" y="61">%</text>
  </g>
  <text class="label" x="1166" y="67" font-size="14" text-anchor="end">STEINS;GATE</text>
</svg>
