  </g>
  <text class="enter" x="884" y="54">↵</text>
  <rect class="next-cursor" x="330" y="73" width="16" height="2.5"/>

  <path d="M894 60V104H612Q600 104 600 116V129" fill="none" stroke="#48646b" stroke-opacity=".35" stroke-width="1.5"/>
  <path class="signal-pulse" pathLength="1" d="M894 60V104H612Q600 104 600 116V129" fill="none" stroke="#65e6dd" stroke-width="3" stroke-linecap="round" stroke-dasharray=".075 1" stroke-dashoffset="1" filter="url(#signal-glow)"/>
  <circle cx="600" cy="129" r="2.5" fill="#39c5bb" opacity=".28"/>

  <rect x="2" y="116" width="1196" height="182" rx="12" fill="url(#cyan-ambient)"/>
  <rect x="2" y="116" width="1196" height="182" rx="12" fill="url(#violet-ambient)"/>
  <path d="M20 116H1180" stroke="#36515a" stroke-opacity=".38"/>
  <text class="label" x="600" y="145" text-anchor="middle">世界線変動率 · DIVERGENCE METER</text>

