<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title description">
  <title id="title">Every commit creates another possibility. 世界線変動率 1.048596%</title>
  <desc id="description">A terminal command presses Enter, sends a cyan signal, and powers seven divergence meter tubes from left to right.</desc>
  <defs>
    <linearGradient id="outer-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071017"/>
      <stop offset=".54" stop-color="#090d14"/>
      <stop offset="1" stop-color="#100b18"/>
    </linearGradient>
    <linearGradient id="terminal-panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#071219"/>
      <stop offset=".58" stop-color="#090f16"/>
      <stop offset="1" stop-color="#100c18"/>
    </linearGradient>
    <radialGradient id="cyan-ambient" cx="25%" cy="100%" r="72%">
      <stop offset="0" stop-color="#39c5bb" stop-opacity=".17"/>
      <stop offset=".58" stop-color="#39c5bb" stop-opacity=".035"/>
      <stop offset="1" stop-color="#39c5bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-ambient" cx="82%" cy="8%" r="70%">
      <stop offset="0" stop-color="#9a71c7" stop-opacity=".15"/>
      <stop offset=".65" stop-color="#9a71c7" stop-opacity=".025"/>
      <stop offset="1" stop-color="#9a71c7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tube-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ddbd4" stop-opacity=".035"/>
      <stop offset=".34" stop-color="#dffaf7" stop-opacity=".12"/>
      <stop offset=".58" stop-color="#ffffff" stop-opacity=".025"/>
      <stop offset="1" stop-color="#161020" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="lock-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39c5bb" stop-opacity="0"/>
      <stop offset=".18" stop-color="#39c5bb"/>
      <stop offset=".72" stop-color="#a879d6"/>
      <stop offset="1" stop-color="#a879d6" stop-opacity="0"/>
    </linearGradient>
    <filter id="digit-glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="signal-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="reveal-clip">
      <rect class="reveal" x="330" y="22" width="540" height="40"/>
    </clipPath>
    <style>
      .terminal-copy { fill:#d7e3e6; font:500 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .prompt { fill:#39c5bb; font:600 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#72828c; font:600 10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing:2.2px; }
      .tube { fill:url(#tube-glass); stroke:#638187; stroke-opacity:.5; }
      .tube-shadow { fill:#1d252c; }
      .glass { fill:none; stroke:#dffffb; stroke-opacity:.15; stroke-width:2; stroke-linecap:round; }
      .wire { fill:none; stroke:#9b7355; stroke-opacity:.33; stroke-width:1.2; }
      .ghost, .digit { font:700 50px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; text-anchor:middle; }
      .ghost { fill:#87aaa9; opacity:.055; }
      .digit { fill:#ffa45b; opacity:.045; transform-box:fill-box; transform-origin:center; }
      .punctuation { fill:#ffa45b; font:700 37px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; opacity:.045; filter:none; }

      .reveal { animation:reveal 10s steps(41, end) infinite; }
      .cursor-window { animation:cursor-window 10s linear infinite; }
      .cursor-inline { fill:#39c5bb; animation:cursor-move 10s steps(41, end) infinite, cursor-blink .72s step-end infinite; }
      .enter { fill:#8be7df; font:600 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; opacity:0; animation:enter-key 10s linear infinite; }
      .next-cursor { fill:#39c5bb; opacity:0; animation:next-cursor 10s linear infinite, cursor-blink .72s step-end infinite; }
      .signal-pulse { opacity:0; animation:signal 10s linear infinite; }
      .digit-0 { animation:digit-0 10s linear infinite; }
      .digit-1 { animation:digit-1 10s linear infinite; }
      .digit-2 { animation:digit-2 10s linear infinite; }
      .digit-3 { animation:digit-3 10s linear infinite; }
      .digit-4 { animation:digit-4 10s linear infinite; }
      .digit-5 { animation:digit-5 10s linear infinite; }
      .digit-6 { animation:digit-6 10s linear infinite; }
      .punctuation { animation:punctuation 10s linear infinite; }
      .lock-cyan, .lock-violet { opacity:0; transform-box:fill-box; transform-origin:center; }
      .lock-cyan { animation:lock-cyan 10s steps(2, end) infinite; }
      .lock-violet { animation:lock-violet 10s steps(2, end) infinite; }

      @keyframes reveal {
        0%, 5% { width:0; }
        29%, 96.5% { width:540px; }
        98%, 100% { width:0; }
      }
      @keyframes cursor-move {
        0%, 5% { transform:translateX(0); }
        29%, 100% { transform:translateX(540px); }
      }
      @keyframes cursor-window {
        0%, 31.4% { opacity:1; }
        31.5%, 100% { opacity:0; }
      }
      @keyframes cursor-blink { 50% { opacity:0; } }
      @keyframes enter-key {
        0%, 31.4% { opacity:0; transform:translateX(-5px); }
        31.5%, 34.4% { opacity:1; transform:translateX(0); }
        35%, 100% { opacity:0; transform:translateX(4px); }
      }
      @keyframes next-cursor {
        0%, 31.9% { opacity:0; }
        32%, 37.2% { opacity:1; }
        37.3%, 100% { opacity:0; }
      }
      @keyframes signal {
        0%, 31.4% { opacity:0; stroke-dashoffset:1; }
        31.5% { opacity:1; stroke-dashoffset:1; }
        36.5% { opacity:1; stroke-dashoffset:0; }
        37.2%, 100% { opacity:0; stroke-dashoffset:0; }
      }

      @keyframes digit-0 {
        0%, 36.4% { opacity:.045; filter:none; transform:translateY(0); }
        36.5% { opacity:.16; filter:url(#digit-glow); }
        37.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        37.7% { opacity:.28; transform:translateY(1px); }
        38.4% { opacity:1; transform:translateY(-1px); }
        39.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-1 {
        0%, 37.4% { opacity:.045; filter:none; transform:translateY(0); }
        37.5% { opacity:.16; filter:url(#digit-glow); }
        38.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        38.7% { opacity:.28; transform:translateY(1px); }
        39.4% { opacity:1; transform:translateY(-1px); }
        40.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-2 {
        0%, 38.4% { opacity:.045; filter:none; transform:translateY(0); }
        38.5% { opacity:.16; filter:url(#digit-glow); }
        39.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        39.7% { opacity:.28; transform:translateY(1px); }
        40.4% { opacity:1; transform:translateY(-1px); }
        41.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-3 {
        0%, 39.4% { opacity:.045; filter:none; transform:translateY(0); }
        39.5% { opacity:.16; filter:url(#digit-glow); }
        40.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        40.7% { opacity:.28; transform:translateY(1px); }
        41.4% { opacity:1; transform:translateY(-1px); }
        42.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-4 {
        0%, 40.4% { opacity:.045; filter:none; transform:translateY(0); }
        40.5% { opacity:.16; filter:url(#digit-glow); }
        41.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        41.7% { opacity:.28; transform:translateY(1px); }
        42.4% { opacity:1; transform:translateY(-1px); }
        43.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-5 {
        0%, 41.4% { opacity:.045; filter:none; transform:translateY(0); }
        41.5% { opacity:.16; filter:url(#digit-glow); }
        42.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        42.7% { opacity:.28; transform:translateY(1px); }
        43.4% { opacity:1; transform:translateY(-1px); }
        44.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }

      @keyframes digit-6 {
        0%, 42.4% { opacity:.045; filter:none; transform:translateY(0); }
        42.5% { opacity:.16; filter:url(#digit-glow); }
        43.1% { opacity:1; filter:url(#digit-glow); transform:translateY(-4px); }
        43.7% { opacity:.28; transform:translateY(1px); }
        44.4% { opacity:1; transform:translateY(-1px); }
        45.3%, 96.5% { opacity:.94; filter:url(#digit-glow); transform:translateY(0); }
        98%, 100% { opacity:.045; filter:none; transform:translateY(0); }
      }
      @keyframes punctuation {
        0%, 36.4% { opacity:.045; filter:none; }
        36.5% { opacity:.15; filter:url(#digit-glow); }
        44.5%, 96.5% { opacity:.94; filter:url(#digit-glow); }
        98%, 100% { opacity:.045; filter:none; }
      }
      @keyframes lock-cyan {
        0%, 46% { opacity:0; transform:translateX(-18px) scaleX(.2); }
        46.4% { opacity:.9; transform:translateX(6px) scaleX(1); }
        47.1% { opacity:.25; transform:translateX(-3px) scaleX(.62); }
        47.6%, 100% { opacity:0; transform:translateX(12px) scaleX(.1); }
      }
      @keyframes lock-violet {
        0%, 46.1% { opacity:0; transform:translateX(15px) scaleX(.18); }
        46.6% { opacity:.78; transform:translateX(-7px) scaleX(.92); }
        47.2% { opacity:.18; transform:translateX(4px) scaleX(.45); }
        47.7%, 100% { opacity:0; transform:translateX(-10px) scaleX(.1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal { animation:none; width:540px; }
        .cursor-window, .enter, .next-cursor, .signal-pulse, .lock-cyan, .lock-violet { display:none; }
        .digit, .punctuation { animation:none; opacity:.94; filter:url(#digit-glow); transform:none; }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="13" fill="url(#outer-panel)" stroke="#273740"/>
  <rect x="2" y="2" width="1196" height="96" rx="12" fill="url(#terminal-panel)"/>
  <rect x="2" y="2" width="4" height="96" rx="2" fill="#39c5bb" opacity=".78"/>
  <path d="M16 18H1184" stroke="#9a71c7" stroke-opacity=".11"/>

  <text class="prompt" x="296" y="53">&gt;</text>
  <g clip-path="url(#reveal-clip)">
